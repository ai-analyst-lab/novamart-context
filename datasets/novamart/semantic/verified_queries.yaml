# NovaMart semantic layer: VERIFIED QUERIES (blessed question -> SQL exemplars).
# When a question pattern has a known-good query, save it here as a few-shot exemplar the agent retrieves.
# Stores the SQL PATTERN only, never the result number (the analyst recomputes). Each is human-verified and
# re-runnable. Grounded: each SQL was run on BOOTCAMP_DB.NOVAMART on Snowflake 2026-06-25.
schema_version: 1
dataset: novamart

verified_queries:
  - name: total_completed_revenue
    question: "What is our total revenue?"
    metric: total_revenue
    sql: |
      SELECT SUM(total_amount)
      FROM orders
      WHERE status = 'completed'
    note: "Completed orders only (excludes cancelled/returned). Do NOT join order_items to sum order
           totals (fans out). Verified on Snowflake."
    verified_by: shane
    verified_at: 2026-06-25
    last_verified: 2026-06-25

  - name: membership_retention
    question: "What is our retention rate?"
    metric: retention
    sql: |
      SELECT COUNT_IF(is_current) * 1.0 / COUNT(*)
      FROM memberships
    note: "Membership retention = currently-active memberships / total. NOT repeat-purchase, NOT
           active-in-both-halves. Verified on Snowflake (~25.6%)."
    verified_by: shane
    verified_at: 2026-06-25
    last_verified: 2026-06-25

  - name: checkout_conversion_rate
    question: "What is our checkout conversion rate?"
    metric: checkout_conversion
    sql: |
      WITH checkout AS (SELECT DISTINCT session_id FROM events WHERE event_type = 'checkout_started'),
           purchase AS (SELECT DISTINCT session_id FROM events WHERE event_type = 'purchase_complete')
      SELECT COUNT(*) * 1.0 / (SELECT COUNT(*) FROM checkout)
      FROM checkout c
      WHERE c.session_id IN (SELECT session_id FROM purchase)
    note: "Session grain, event-based. Do NOT use sessions.had_purchase (unreliable Q4 2024). Numerator =
           checkout sessions that also have a purchase_complete event. Verified on Snowflake."
    verified_by: shane
    verified_at: 2026-06-25
    last_verified: 2026-06-25
