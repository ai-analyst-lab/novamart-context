# HOME: Meaning contracts (Home 3) — the communal store's meaning-contract home.
# NovaMart metric dictionary (loaded at session start by knowledge-bootstrap).
# A metric is defined by its MEANING, never by a hardcoded result number.
# The analyst computes the value from the data; the definition only pins what to count.
metrics:
  - metric: checkout_conversion
    means: "share of checkout sessions that complete a purchase"
    grain: session
    numerator: sessions with a purchase_complete event
    denominator: sessions with a checkout_started event
    window: full data window
    rejected: ["session -> purchase over all sessions", "cart -> checkout", "checkout -> payment step", "users grain instead of sessions"]
    last_verified: 2026-06-25
    verified_by: shane

  - metric: total_revenue
    means: "total revenue from completed orders"
    grain: order
    numerator: total_revenue           # measures.yaml — SUM(orders.total_amount), net of discount, includes shipping
    denominator: null
    window: full data window
    rejected:
      - "include cancelled/returned orders"
      - "sum total_amount across an orders-to-order_items join (fans out: ~5.9M vs ~3.15M correct)"
    last_verified: 2026-06-25
    verified_by: shane

  - metric: gross_revenue
    means: "pre-discount merchandise value of completed orders"
    grain: order
    numerator: gross_revenue           # measures.yaml — SUM(orders.subtotal), pre-discount, excludes shipping
    denominator: null
    window: full data window
    filters:
      - "orders.status = 'completed'"
    rejected:
      - "total_amount basis — total_amount is net of the discount (subtotal − discount_amount) and includes shipping_amount; it is a settlement figure, not a gross merchandise figure"
      - "any shipping-inclusive reading — shipping is a fulfillment charge, not merchandise revenue"
      - "include cancelled/returned orders"
      - "sum across an orders-to-order_items join (fans out, inflates)"
    last_verified: 2026-07-07
    verified_by: shane

  - metric: retention
    means: "share of memberships that are currently active out of all memberships ever created"
    grain: membership
    numerator: memberships where is_current = TRUE
    denominator: all memberships ever created
    window: snapshot (point-in-time)
    filters:
      - "no status or date filter on the denominator — every membership_id counts"
    rejected:
      - "active or converted over all memberships (overcounts: counts converted trial-to-paid members as retained)"
      - "1 − (cancelled / all memberships) (overcounts: counts expired members as retained)"
      - "active / (active + cancelled) (shrinks the denominator by excluding expired and other non-cancelled statuses)"
    last_verified: 2026-07-09
    verified_by: shane

  - metric: net_revenue
    means: "revenue from completed orders minus revenue from returned orders, at each order's settlement amount"
    grain: order
    numerator: "SUM(total_amount) for completed orders − SUM(total_amount) for returned orders"
    denominator: null
    window: full data window
    filters:
      - "orders.status IN ('completed', 'returned')"
    rejected:
      - "subtracting discount_amount from total_amount (total_amount is already net of the discount; subtracting again double-counts it)"
      - "counting cancelled orders as returns (cancelled orders never captured revenue — they should be excluded entirely)"
      - "ignoring returned orders (that yields completed revenue / total_revenue, a different metric)"
      - "joining through order_items to sum total_amount (the order total repeats per line item, inflating the result)"
    last_verified: 2026-07-09
    verified_by: shane
